    <div id="media-modal" class="fixed inset-0 z-[1100] bg-dark/95 backdrop-blur-xl hidden opacity-0 transition-opacity duration-300 flex items-center justify-center p-4">
        <button onclick="closeModal()" class="absolute top-6 right-6 text-gray-400 hover:text-white transition-colors z-50">
            <svg class="w-12 h-12" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"></path></svg>
        </button>
        <div class="relative w-full max-w-6xl flex items-center justify-center scale-95 transition-transform duration-300" id="modal-content-wrapper"></div>
    </div>

    <script>
        const filterBtns = document.querySelectorAll('.filter-btn');
        const galleryItems = document.querySelectorAll('.gallery-item');

        filterBtns.forEach(btn => {
            btn.addEventListener('click', () => {
                const filterValue = btn.getAttribute('data-filter');

                
                filterBtns.forEach(b => {
                    b.classList.remove('active', 'border-volt', 'text-volt', 'shadow-[0_0_15px_rgba(162,255,0,0.4)]');
                    b.classList.add('border-white/10', 'text-gray-400');
                });

                
                btn.classList.remove('border-white/10', 'text-gray-400');
                btn.classList.add('active', 'border-volt', 'text-volt', 'shadow-[0_0_15px_rgba(162,255,0,0.4)]');

                
                galleryItems.forEach(item => {
                    const category = item.getAttribute('data-category');
                    
                    if (filterValue === 'all' || category === filterValue) {
                        item.style.display = 'block';
                        setTimeout(() => { 
                            item.style.opacity = '1'; 
                            item.style.transform = 'scale(1)'; 
                        }, 50);
                    } else {
                        item.style.opacity = '0';
                        item.style.transform = 'scale(0.95)';
                        setTimeout(() => { 
                            item.style.display = 'none'; 
                        }, 300);
                    }
                });
            });
        });

        
        const modal = document.getElementById('media-modal');
        const modalWrapper = document.getElementById('modal-content-wrapper');

        function openModal(mediaSrc, isVideo = false) {
             modal.classList.remove('hidden');
            setTimeout(() => { modal.classList.remove('opacity-0'); }, 10);

            if (isVideo) {
        
                modalWrapper.innerHTML = `
                    <div id="loader-container" class="spinner-container">
                        <span class="loader"></span>
                        <p class="text-volt font-bold animate-pulse">Loading Video...</p>
                    </div>
                    <iframe id="video-iframe" src="${mediaSrc}" 
                        class="w-full aspect-video opacity-0 transition-opacity duration-500 rounded-2xl border-2 border-volt" 
                        allow="autoplay" allowfullscreen>
                    </iframe>`;

        
                const iframe = document.getElementById('video-iframe');
                const loader = document.getElementById('loader-container');
        
                iframe.onload = function() {
                loader.classList.add('hidden'); 
                iframe.classList.remove('opacity-0'); 
             };
            } else {
        
                 modalWrapper.innerHTML = `<img src="${mediaSrc}" class="...">`;
             }
            
            
        }

        function closeModal() {
            modal.classList.add('opacity-0');
            modalWrapper.classList.remove('scale-100');
            setTimeout(() => { 
                modal.classList.add('hidden'); 
                modalWrapper.innerHTML = ''; 
                document.body.style.overflow = 'auto'; 
            }, 300);
        }

        modal.addEventListener('click', (e) => { 
            if (e.target === modal) closeModal(); 
        });
    </script>
    <script>
        const burger = document.getElementById('burger');
        const navLinks = document.getElementById('nav-links');

        
        if (burger && navLinks) {
            burger.addEventListener('click', () => {
                
                navLinks.classList.toggle('active');
                burger.classList.toggle('toggle');
            });
        }
    </script>
