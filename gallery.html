                <img src="./assets/images/8f90985061ea1dab0aef3d131426bf2f.jpg" class="w-full grayscale opacity-70 group-hover:grayscale-0 group-hover:opacity-100">
            </div>
            <div class="masonry-item gallery-item group relative rounded-xl overflow-hidden cursor-pointer bg-dark border border-white/5" data-category="photo" onclick="openModal('./assets/images/93a3a09c9a4fd0290444403bf01f3555.jpg')">
                <img src="./assets/images/93a3a09c9a4fd0290444403bf01f3555.jpg" class="w-full grayscale opacity-70 group-hover:grayscale-0 group-hover:opacity-100">
            </div>
            <div class="masonry-item gallery-item group relative rounded-xl overflow-hidden cursor-pointer bg-dark border border-white/5" data-category="photo" onclick="openModal('./assets/images/765b0376fe409e193bb8d04f63bb02c4.jpg')">
                <img src="./assets/images/765b0376fe409e193bb8d04f63bb02c4.jpg" class="w-full grayscale opacity-70 group-hover:grayscale-0 group-hover:opacity-100">
            </div>
            <div class="masonry-item gallery-item group relative rounded-xl overflow-hidden cursor-pointer bg-dark border border-white/5" data-category="photo" onclick="openModal('./assets/images/4f00729d2b2ebb82e55424f8d0a32f22.jpg')">
                <img src="./assets/images/4f00729d2b2ebb82e55424f8d0a32f22.jpg" class="w-full grayscale opacity-70 group-hover:grayscale-0 group-hover:opacity-100">
            </div>
            <div class="masonry-item gallery-item group relative rounded-xl overflow-hidden cursor-pointer bg-dark border border-white/5" data-category="photo" onclick="openModal('./assets/images/2d92b4d5004a319cadc8fe75d11700a2.jpg')">
                <img src="./assets/images/2d92b4d5004a319cadc8fe75d11700a2.jpg" class="w-full grayscale opacity-70 group-hover:grayscale-0 group-hover:opacity-100">
            </div>
        </div>
    </main>

    <div id="media-modal" class="fixed inset-0 z-[100] bg-dark/95 backdrop-blur-xl hidden opacity-0 transition-opacity duration-300 flex items-center justify-center p-4">
        <button onclick="closeModal()" class="absolute top-6 right-6 text-gray-400 hover:text-white transition-colors z-50">
            <svg class="w-12 h-12" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"></path></svg>
        </button>
        <div class="relative w-full max-w-6xl flex items-center justify-center scale-95 transition-transform duration-300" id="modal-content-wrapper"></div>
    </div>

    <script>
        const filterBtns = document.querySelectorAll('.filter-btn');
        const galleryItems = document.querySelectorAll('.gallery-item');

        filterBtns.forEach(btn => {
            btn.addEventListener('click', () => {
                const filterValue = btn.getAttribute('data-filter');

                
                filterBtns.forEach(b => {
                    b.classList.remove('active', 'border-volt', 'text-volt', 'shadow-[0_0_15px_rgba(162,255,0,0.4)]');
                    b.classList.add('border-white/10', 'text-gray-400');
                });

                
                btn.classList.remove('border-white/10', 'text-gray-400');
                btn.classList.add('active', 'border-volt', 'text-volt', 'shadow-[0_0_15px_rgba(162,255,0,0.4)]');

                
                galleryItems.forEach(item => {
                    const category = item.getAttribute('data-category');
                    
                    if (filterValue === 'all' || category === filterValue) {
                        item.style.display = 'block';
                        setTimeout(() => { 
                            item.style.opacity = '1'; 
                            item.style.transform = 'scale(1)'; 
                        }, 50);
                    } else {
                        item.style.opacity = '0';
                        item.style.transform = 'scale(0.95)';
                        setTimeout(() => { 
                            item.style.display = 'none'; 
                        }, 300);
                    }
                });
            });
        });

        
        const modal = document.getElementById('media-modal');
        const modalWrapper = document.getElementById('modal-content-wrapper');

        function openModal(mediaSrc, isVideo = false) {
            modal.classList.remove('hidden');
            setTimeout(() => { 
                modal.classList.remove('opacity-0'); 
                modalWrapper.classList.add('scale-100'); 
            }, 10);

            if (isVideo) {
                modalWrapper.innerHTML = `
                    <video class="w-full h-auto max-h-[85vh] rounded-2xl shadow-2xl border-2 border-volt shadow-[0_0_40px_rgba(162,255,0,0.3)]" controls autoplay>
                        <source src="${mediaSrc}" type="video/mp4">
                    </video>`;
            } else {
                modalWrapper.innerHTML = `
                    <img src="${mediaSrc}" class="max-w-full max-h-[90vh] object-contain rounded-xl shadow-2xl border border-volt shadow-[0_0_40px_rgba(162,255,0,0.3)]">`;
            }
            document.body.style.overflow = 'hidden';
        }

        function closeModal() {
            modal.classList.add('opacity-0');
            modalWrapper.classList.remove('scale-100');
            setTimeout(() => { 
                modal.classList.add('hidden'); 
                modalWrapper.innerHTML = ''; 
                document.body.style.overflow = 'auto'; 
            }, 300);
        }

        modal.addEventListener('click', (e) => { 
            if (e.target === modal) closeModal(); 
        });
    </script>
</body>
</html>
